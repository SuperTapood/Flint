import "k8s/k8s_stack.proto";
import "k8s/k8s_connection.proto";

message StackTypes {
    oneof type {
        K8SStack K8S_stack = 1;
    }
}

message ConnectionTypes {
    oneof type {
        K8SConnection K8S_connection = 1;
    }
}

message Stack {
    string name = 1;
    StackTypes stack = 2;
    ConnectionTypes connection = 3;
}