message Container {
    string name = 1;
    string image = 2;
    optional repeated int32 ports = 3;
}

message VolumeMount {
    string name = 1;
    string mount_path = 2;
}

message Pod {
    optional string name = 1;
    repeated Container containers = 2;
    optional repeated VolumeMount mounts = 3;
    string restart_policy default "Always" = 4;
}